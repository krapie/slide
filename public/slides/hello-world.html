<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello, World — slide.kevinprk.com</title>
  <style>
    @import url("https://rsms.me/inter/inter.css");
    @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap");

    :root {
      --kp-white:  #ffffff;
      --kp-gray-50:  #fafafa;
      --kp-gray-100: #f4f4f4;
      --kp-gray-200: #e8e8e8;
      --kp-gray-300: #d4d4d4;
      --kp-gray-400: #a3a3a3;
      --kp-gray-500: #737373;
      --kp-gray-600: #525252;
      --kp-gray-800: #262626;
      --kp-gray-900: #171717;
      --kp-black:    #0a0a0a;

      --kp-bg:        var(--kp-white);
      --kp-bg-muted:  var(--kp-gray-100);
      --kp-fg:        var(--kp-black);
      --kp-fg-1:      var(--kp-gray-900);
      --kp-fg-2:      var(--kp-gray-600);
      --kp-fg-3:      var(--kp-gray-500);
      --kp-fg-4:      var(--kp-gray-400);
      --kp-border:    var(--kp-gray-200);

      --kp-font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
      --kp-font-mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --kp-bg:       var(--kp-black);
        --kp-bg-muted: var(--kp-gray-800);
        --kp-fg:       var(--kp-gray-50);
        --kp-fg-1:     var(--kp-gray-100);
        --kp-fg-2:     var(--kp-gray-400);
        --kp-fg-3:     var(--kp-gray-500);
        --kp-fg-4:     var(--kp-gray-600);
        --kp-border:   #2a2a2a;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      font-family: var(--kp-font-sans);
      background: var(--kp-bg);
      color: var(--kp-fg-1);
      -webkit-font-smoothing: antialiased;
    }

    .slide {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 64px 72px;
    }

    .slide-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: auto;
    }

    .pi-mark {
      width: 24px;
      height: 24px;
      background: var(--kp-fg);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .pi-mark span {
      font-family: var(--kp-font-sans);
      font-size: 14px;
      font-weight: 500;
      color: var(--kp-bg);
      line-height: 1;
    }

    .slide-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .label {
      font-family: var(--kp-font-mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--kp-fg-4);
      margin-bottom: 20px;
    }

    h1 {
      font-size: clamp(40px, 6vw, 64px);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.05;
      color: var(--kp-fg);
      margin-bottom: 20px;
    }

    .subtitle {
      font-size: clamp(15px, 2vw, 20px);
      color: var(--kp-fg-3);
      font-weight: 400;
      line-height: 1.5;
      max-width: 520px;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-top: 48px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border: 1px solid var(--kp-border);
      border-radius: 4px;
      font-family: var(--kp-font-mono);
      font-size: 11px;
      color: var(--kp-fg-3);
      letter-spacing: -0.005em;
    }

    .slide-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-pi {
      font-family: var(--kp-font-sans);
      font-size: 13px;
      color: var(--kp-fg-4);
    }

    .page-num {
      font-family: var(--kp-font-mono);
      font-size: 11px;
      color: var(--kp-fg-4);
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="slide-header">
      <div class="pi-mark"><span>π</span></div>
    </div>

    <div class="slide-content">
      <p class="label">slide.kevinprk.com</p>
      <h1>Hello,<br>World.</h1>
      <p class="subtitle">
        A sample slide to verify the setup and confirm the design system is working correctly.
      </p>
      <div class="meta-row">
        <span class="tag">kevinprk design system</span>
        <span class="tag">2026-05-20</span>
      </div>
    </div>

    <div class="slide-footer">
      <span class="footer-pi">π</span>
      <span class="page-num">01</span>
    </div>
  </div>
</body>
</html>
